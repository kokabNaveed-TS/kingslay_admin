services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: kingsleys_frontend

    restart: always

    ports:
      - "3000:80"

    depends_on:
      - backend

    networks:
      - kingsleys_network



  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: kingsleys_backend

    restart: always

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - mysql

    networks:
      - kingsleys_network



  mysql:
    image: mysql:8

    container_name: kingsleys_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: kingsleys

    volumes:
      - mysql_data:/var/lib/mysql

    ports:
      - "3306:3306"

    networks:
      - kingsleys_network



volumes:
  mysql_data:



networks:
  kingsleys_network:
    driver: bridge