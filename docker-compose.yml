services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: kingsleys_frontend

    restart: always

    ports:
      - "3000:80"

    depends_on:
      - backend

    networks:
      - kingsleys_network
      - internal_network



  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: kingsleys_backend

    restart: always

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - mysql

    networks:
      - kingsleys_network
      - internal_network


networks:
  kingsleys_network:
    driver: bridge

  internal_network:
    external: true  