services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: kingsleys_frontend
    restart: always

    depends_on:
      - backend

    labels:
      - "traefik.enable=true"

      # Frontend domain ONLY (no /api)
      - "traefik.http.routers.kingsleys_frontend.rule=Host(`dashboard.projectkingsleys.com`)"
      - "traefik.http.routers.kingsleys_frontend.entrypoints=websecure"
      - "traefik.http.routers.kingsleys_frontend.tls=true"
      - "traefik.http.routers.kingsleys_frontend.tls.certresolver=production"

      - "traefik.http.services.kingsleys_frontend.loadbalancer.server.port=80"

    networks:
      - kingsleys_network
      - internal_network


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: kingsleys_backend
    restart: always

    env_file:
      - ./backend/.env

    labels:
      - "traefik.enable=true"

      # IMPORTANT: backend should NOT share same host rule as frontend
      # Use API subpath routing safely
      - "traefik.http.routers.kingsleys_backend.rule=Host(`dashboard.projectkingsleys.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.kingsleys_backend.entrypoints=websecure"
      - "traefik.http.routers.kingsleys_backend.tls=true"
      - "traefik.http.routers.kingsleys_backend.tls.certresolver=production"

      # IMPORTANT FIX (strip /api before sending to Express)
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.kingsleys_backend.middlewares=api-strip"

      - "traefik.http.services.kingsleys_backend.loadbalancer.server.port=5000"

    networks:
      - kingsleys_network
      - internal_network


networks:
  kingsleys_network:
    driver: bridge

  internal_network:
    external: true